<script type="module">

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCFCnb-K042ZmU-W-CozLCA8PhznNLZ-MA",
  authDomain:        "roadster988.firebaseapp.com",
  projectId:         "roadster988",

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

const p = new URLSearchParams(location.search);
const amount = parseFloat(p.get('amount'));
const note   = p.get('note') || '';
const type   = p.get('type') || 'و”¯ه‡؛';
const date   = p.get('date') || new Date().toISOString().slice(0,10);

const iconEl  = document.getElementById('iconEl');
const msgEl   = document.getElementById('msgEl');
const detailEl = document.getElementById('detailEl');

if (!amount || isNaN(amount)) {
  iconEl.textContent = 'âڑ ï¸ڈ';
  msgEl.textContent  = 'ç¼؛ه°‘é‡‘é¢‌هڈ‚و•°';
  detailEl.textContent = 'è¯·هœ¨ه؟«وچ·وŒ‡ن»¤ن¸­è®¾ç½® amount هڈ‚و•°';
} else {
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await writeToFirestore(user.uid);
    } else {
      writeToLocal();
    }
  });
}

async function writeToFirestore(uid) {
  const txId = 'sc_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  const ref = doc(db, 'users', uid, 'transactions', txId);

  try {
    await setDoc(ref, {
      id:        txId,
      date:      date,
      type:      type,
      amount:    amount,
      category:  note || 'ه…¶ن»–',
      note:      note,
      createdAt: new Date().toISOString(),
      updatedAt: serverTimestamp(),
      deleted:   false,
      version:   1,
      source:    'shortcut',
    });

    iconEl.textContent = 'âœ…';
    msgEl.textContent  = 'ه·²è®°ه½• آ· Firestore';
    detailEl.textContent = `${type} آ¥${amount.toFixed(2)} ${note}`;
  } catch (e) {
    console.error('[add] Firestore write failed:', e);
    writeToLocal();
  }
}

function writeToLocal() {
  try {
    const tx = {
      id: 'sc_' + Date.now() + '_' + Math.random().toString(36).slice(2,8),
      date, type, amount, category: note || 'ه…¶ن»–', note,
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
      deleted: false, version: 1, source: 'shortcut'
    };
    const pending = JSON.parse(localStorage.getItem('rdstr_shortcut_queue') || '[]');
    pending.push(tx);
    localStorage.setItem('rdstr_shortcut_queue', JSON.stringify(pending));

    iconEl.textContent = 'âœ…';

  }
}
